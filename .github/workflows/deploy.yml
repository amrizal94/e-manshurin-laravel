name: Production — aaPanel

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to aaPanel
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "bash /www/wwwroot/emanshurin/deploy/update.sh"

      - name: Health check
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://emanshurin.kreasikaryaarjuna.co.id/")
          if [ "$STATUS" -ne 200 ]; then
            echo "Health check gagal: HTTP $STATUS"
            exit 1
          fi
          echo "Health check OK: HTTP $STATUS"
