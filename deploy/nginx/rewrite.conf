# E-Manshurin — nginx rewrite config (aaPanel "URL rewrite" slot)
# Placeholder __APP_DIR__ / __WEB_PORT__ / __FACE_PORT__ diganti otomatis
# oleh deploy/initial-setup.sh. Jangan pasang __FACE_PORT__ publik —
# face-service hanya dipanggil internal oleh Laravel (FACE_SERVICE_URL),
# tidak perlu location nginx sendiri.

# ── Laravel API (/api/ dan /sanctum/) → PHP-FPM 8.3 ──────────────
location ^~ /api/ {
    root __APP_DIR__/backend/public;
    try_files $uri /index.php$is_args$args;

    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi-83.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME __APP_DIR__/backend/public/index.php;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }
}

location ^~ /sanctum/ {
    root __APP_DIR__/backend/public;
    try_files $uri /index.php$is_args$args;
    location ~ \.php$ {
        fastcgi_pass unix:/tmp/php-cgi-83.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME __APP_DIR__/backend/public/index.php;
        include fastcgi_params;
    }
}

# ── Storage publik Laravel (foto jamaah/wajah) ────────────────────
location ^~ /storage/ {
    alias __APP_DIR__/backend/storage/app/public/;
    expires 30d;
}

# ── Static Next.js assets ──────────────────────────────────────────
location /_next/static/ {
    alias __APP_DIR__/web/.next/standalone/.next/static/;
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# ── Next.js web → PM2 port __WEB_PORT__ ───────────────────────────
location / {
    proxy_pass http://127.0.0.1:__WEB_PORT__;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_cache off;
    proxy_read_timeout 30;
}
