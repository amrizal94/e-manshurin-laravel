# E-Manshurin — nginx rewrite config (aaPanel "URL rewrite" slot)
# Placeholder __APP_DIR__ / __WEB_PORT__ / __FACE_PORT__ diganti otomatis
# oleh deploy/initial-setup.sh. Jangan pasang __FACE_PORT__ publik —
# face-service hanya dipanggil internal oleh Laravel (FACE_SERVICE_URL),
# tidak perlu location nginx sendiri.

# ── Laravel API (/api/ dan /sanctum/) → PHP-FPM 8.3 ──────────────
# Langsung fastcgi_pass ke index.php, TANPA try_files/nested location:
# try_files yang jatuh ke /index.php$is_args$args memicu internal redirect
# yang dicari ulang dari top-level location (bukan scope nested /api/),
# jatuh ke `location /` (proxy Next.js) karena tak ada handler .php di top-level.
location ^~ /api/ {
    fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME __APP_DIR__/backend/public/index.php;
    fastcgi_param SCRIPT_NAME /index.php;
    fastcgi_param REQUEST_URI $request_uri;
    fastcgi_param DOCUMENT_ROOT __APP_DIR__/backend/public;
    include fastcgi_params;
    fastcgi_read_timeout 300;
}

location ^~ /sanctum/ {
    fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME __APP_DIR__/backend/public/index.php;
    fastcgi_param SCRIPT_NAME /index.php;
    fastcgi_param REQUEST_URI $request_uri;
    fastcgi_param DOCUMENT_ROOT __APP_DIR__/backend/public;
    include fastcgi_params;
    fastcgi_read_timeout 60;
}

# ── Storage publik Laravel (foto jamaah/wajah) ────────────────────
location ^~ /storage/ {
    alias __APP_DIR__/backend/storage/app/public/;
    expires 30d;
}

# ── Static Next.js assets ──────────────────────────────────────────
location /_next/static/ {
    alias __APP_DIR__/web/.next/standalone/.next/static/;
    expires 1y;
    add_header Cache-Control "public, immutable";
}

# ── Next.js web → PM2 port __WEB_PORT__ ───────────────────────────
location / {
    proxy_pass http://127.0.0.1:__WEB_PORT__;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_cache off;
    proxy_read_timeout 30;
}
